# Next.js 16 on Netlify (OpenNext adapter — auto-detected)
# Docs: https://docs.netlify.com/build/frameworks/framework-setup-guides/nextjs/overview/

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"

# Optional: redirect www → apex (uncomment and set your domain)
# [[redirects]]
#   from = "https://www.example.com/*"
#   to = "https://example.com/:splat"
#   status = 301
#   force = true
